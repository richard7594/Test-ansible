---
- name: Installer et configurer Nginx sur Debian
  hosts: webserver
  become: true

  tasks:

    - name: Mettre à jour le cache APT
      apt:
        update_cache: yes

    - name: Mettre à jour les paquets
      apt:
        upgrade: dist

    - name: Installer nginx
      apt:
        name: nginx
        state: present

    - name: Démarrer et activer nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Créer la page d'accueil personnalisée
      copy:
        dest: /var/www/html/index.html
        content: "<h1>Welcome to My Web Server richou IP-{{ ansible_hostname }}</h1>"
        mode: '0644'

    - name: Deploy nginx default site configuration
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
            server {
                listen 80 default_server;
                listen [::]:80 default_server;

                root /var/www/html;

                index index.html index.htm index.nginx-debian.html;

                server_name _;

                location / {
                    try_files $uri $uri/ =404;
                }

                location /health {
                    access_log off;
                    return 200 "healthy\n";
                }
            }
        owner: root
        group: root
        mode: '0644'
        
    - name: Démarrer et activer nginx
      service:
        name: nginx
        state: reloaded
        enabled: yes    

